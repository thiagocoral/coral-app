apiVersion: apps/v1
kind: Deployment
metadata:
  name: coral-app
  namespace: coral-project-krq9s
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coral-app
  template:
    metadata:
      labels:
        app: coral-app
    spec:
      containers:
      - name: app-container
        # Mudamos para :latest para "limpar" o erro de manifest not found
        image: docker.io/thicoral/coral-app:latest 
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: NAI_ENDPOINT
          value: "https://10-54-94-16.sslip.nutanixdemo.com/enterpriseai/v1/chat/completions"
        - name: NAI_API_KEY
          value: "bac373c4-2607-4c8d-9521-62dd3ed781e9"
        - name: MODEL_NAME
          value: "coral-endpoint"