apiVersion: apps/v1
kind: Deployment
metadata:
  name: coral-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coral-app
  template:
    metadata:
      labels:
        app: coral-app
    spec:
      containers:
      - name: app-container
        image: thicoral/coral-app:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: coral-app