name: Docker Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Adicionado: QEMU para suporte a múltiplas plataformas (essencial para evitar erro de manifest)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Configurado: Buildx focado em linux/amd64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build do BACKEND
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: thicoral/coral-app:v1
          # Adicionado: força o registro do manifest corretamente
          provenance: false

      # Build do FRONTEND
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          platforms: linux/amd64
          push: true
          tags: thicoral/coral-app:frontend
          # Adicionado: evita metadados extras que às vezes quebram o pull em clusters antigos
          provenance: false