steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build do BACKEND (Tag: v1)
      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile # Garanta que esse é o docker do FastAPI
          platforms: linux/amd64
          push: true
          tags: thicoral/coral-app:v1

      # Build do FRONTEND (Tag: frontend)
      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.frontend # O arquivo que roda o Streamlit
          platforms: linux/amd64
          push: true
          tags: thicoral/coral-app:frontend