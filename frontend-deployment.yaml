apiVersion: apps/v1
kind: Deployment
metadata:
  name: coral-frontend
  namespace: coral-project-krq9s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coral-frontend
  template:
    metadata:
      labels:
        app: coral-frontend
    spec: 
      containers:
      - name: frontend
        image: docker.io/thicoral/coral-app:v1
        imagePullPolicy: Always
        env:
        - name: NAI_ENDPOINT
          value: "https://10-54-94-16.sslip.nutanixdemo.com/enterpriseai/v1/chat/completions"
        - name: NAI_API_KEY
          value: "bac373c4-2607-4c8d-9521-62dd3ed781e9"
        - name: MODEL_NAME
          value: "coral-endpoint"
        # Garante que o Kubernetes saiba que a porta interna é 8000
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: coral-project-krq9s
spec:
  type: LoadBalancer
  ports:
  - port: 80         # Porta externa (IP:80)
    targetPort: 8000 # CORRIGIDO: Alinhado com o log "Uvicorn running on http://0.0.0.0:8000"
  selector:
    app: coral-frontend