apiVersion: apps/v1
kind: Deployment
metadata:
  name: coral-frontend
  namespace: coral-project-krq9s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coral-frontend
  template:
    metadata:
      labels:
        app: coral-frontend
    spec: 
      containers:
      - name: frontend-container
        image: docker.io/thicoral/coral-app:frontend
        env:
        - name: NAI_ENDPOINT
          value: "https://10-54-94-16.sslip.nutanixdemo.com/enterpriseai/v1/chat/completions"
        - name: NAI_API_KEY
          value: "c5e46281-8985-48ae-b367-fe61c7875d71"
        - name: MODEL_NAME
          value: "coral-endpoint"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: coral-project-krq9s
spec:
  type: LoadBalancer
  ports:
  - port: 80         # Porta que você vai digitar no navegador
    targetPort: 8501 # Porta onde o Streamlit está ouvindo
  selector:
    app: coral-frontend