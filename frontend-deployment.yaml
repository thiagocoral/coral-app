apiVersion: apps/v1
kind: Deployment
metadata:
  name: coral-frontend
  namespace: coral-project-krq9s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coral-frontend
  template:
    metadata:
      labels:
        app: coral-frontend
    spec: 
      containers:
      - name: frontend
        # Mudamos para :latest também
        image: docker.io/thicoral/coral-app:latest 
        imagePullPolicy: Always
        env:
        - name: NAI_ENDPOINT
          value: "https://10-54-94-16.sslip.nutanixdemo.com/enterpriseai/v1/chat/completions"
        - name: NAI_API_KEY
          value: "bac373c4-2607-4c8d-9521-62dd3ed781e9"
        - name: MODEL_NAME
          value: "coral-endpoint"
        ports:
        - containerPort: 8501