apiVersion: apps/v1
kind: Deployment
metadata:
  name: meu-app-modular
spec:
  replicas: 2
  selector:
    matchLabels:
      app: modular-app
  template:
    metadata:
      labels:
        app: modular-app
    spec:
      containers:
      - name: app-container
        image: seu-usuario/meu-app-modular:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: modular-app